services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: always
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    restart: always
    env_file: .env.prod
    deploy:
      replicas: 2
    depends_on:
      - redis
      - postgres
    security_opt:
      - no-new-privileges:true

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    command: ["celery", "-A", "tasks.celery_app", "beat", "--loglevel=info"]
    restart: always
    env_file: .env.prod
    depends_on:
      - redis
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    restart: always
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/ssl:ro
    depends_on:
      - api
      - frontend

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file: .env.prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U equiscore -d equiscore"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

  grafana:
    image: grafana/grafana
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  grafana_data:
