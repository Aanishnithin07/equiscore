events { 
    worker_connections 1024; 
}

http {
    upstream api { server api:8000; }
    upstream frontend { server frontend:80; }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_upload:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=10r/m;

    server {
        listen 80;
        server_name _;
        # Always return strictly 301 enforcing HTTPS globally
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name equiscore.app;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src fonts.gstatic.com; connect-src 'self' wss://equiscore.app";

        # File upload size limit (match FastAPI 50MB limit)
        client_max_body_size 55M;

        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/evaluation/pitch {
            limit_req zone=api_upload burst=3 nodelay;
            proxy_pass http://api;
            proxy_read_timeout 120s;  # Long timeout for upload processing natively 
        }

        location /api/v1/auth/ {
            limit_req zone=api_auth burst=5 nodelay;
            proxy_pass http://api;
        }

        location /api/v1/ws/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;  # Keep WebSocket alive for 24h explicitly
        }

        location / {
            proxy_pass http://frontend;
            try_files $uri $uri/ /index.html;
        }
    }
}
